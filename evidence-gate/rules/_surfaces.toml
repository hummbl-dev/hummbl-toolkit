[[roots]]
env = "HUMMBL_PRODUCTION_ROOT"

[[roots]]
relative_to_self = "../../hummbl-production"

[[roots]]
discover = { nearest_ancestor_with = "hummbl-production/.git" }

# Fallback root for standalone evidence-gate CI (issue #4): resolves to the
# evidence-gate repo root itself so that load_library's resolve_root succeeds
# without requiring the private hummbl-production checkout.
[[roots]]
relative_to_self = ".."

[surfaces]
external = [
  "hummbl-production/web/**/*.html",
  "hummbl-production/brand/**/*.html",
  "hummbl-production/web/case-studies/**/*.md",
  "hummbl-production/decks/**/*.md",
]
internal = [
  "hummbl-production/_internal/**",
  "hummbl-production/scripts/**",
]
case_studies_corpus = [
  "hummbl-production/web/case-studies/**/*.html",
  "hummbl-production/web/case-studies/cases.json",
]
canonical_corpus = [
  "hummbl-production/_internal/canonical-claims/**/*.md",
  "hummbl-production/_internal/canonical-claims/**/*.txt",
]

